version: 2

models:
  - name: fct_orders
    description: One row per order with revenue, delivery, payment, and review metrics.

    columns:
      - name: order_id
        description: Unique order identifier.
        data_tests:
          - unique
          - not_null

      - name: customer_id
        description: Customer linked to the order.
        data_tests:
          - not_null

      - name: order_status
        description: Lifecycle status of the order.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - created
                  - approved
                  - invoiced
                  - processing
                  - shipped
                  - delivered
                  - unavailable
                  - canceled

      - name: total_payment_value
        description: Total payment amount associated with the order.
        data_tests:
          - not_null